<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Color Palette Generator</title>
    <!-- Favicon for a better user experience -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <!-- Link to the main stylesheet -->
    <link rel="stylesheet" href="src/style.css">
    <!-- Preconnect to Google Fonts for performance if using them -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Example: Link to a specific font family from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1>🎨 Dynamic Color Palette Generator</h1>
        <p>Generate, lock, and copy beautiful color palettes.</p>
        <!-- Navigation to other interconnected services -->
        <nav class="interconnected-nav">
            <a href="#" class="nav-link" data-service="drawing-board">Drawing Board</a>
            <a href="#" class="nav-link" data-service="markdown-editor">Markdown Editor</a>
            <a href="#" class="nav-link" data-service="kanban-board">Kanban Board</a>
        </nav>
    </header>

    <main class="palette-container" id="paletteContainer">
        <!-- Color cards will be dynamically inserted here by JavaScript -->
        <!-- Example structure for a single color card (will be generated by JS) -->
        <!--
        <div class="color-card" data-color="#RRGGBB">
            <div class="color-box" style="background-color: #RRGGBB;"></div>
            <div class="color-info">
                <span class="hex-code">#RRGGBB</span>
                <button class="copy-btn" aria-label="Copy hex code"></button>
                <button class="lock-btn" aria-label="Lock color"></button>
            </div>
        </div>
        -->
    </main>

    <footer class="app-footer">
        <button id="generateBtn" class="action-btn primary-btn">Generate Palette</button>
        <p class="instructions">Press <kbd>Spacebar</kbd> to generate a new palette.</p>
        <p class="copyright">&copy; 2023 Dynamic Color Palette Generator. All rights reserved.</p>
    </footer>

    <!-- Defer JavaScript execution to improve page load performance -->
    <script type="module" src="src/index.js"></script>
</body>
</html>
